<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOD_AE86 ✦ аниме-плеер (AniLibria + Gogo)</title>
  <meta name="description" content="Персональная страница GOD_AE86. Аниме-вайб, неко API и Telegram-спамер.">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Person","name":"GOD_AE86","alternateName":"resivert","url":"https://t.me/GOD_AE86"}</script>
  <script src="https://cdn.jsdelivr.net/npm/libphonenumber-js@1.11.12/bundle/libphonenumber-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ════════════════════ ПЕРЕМЕННЫЕ (тёмная тема) ════════════════════ */
    :root {
      --bg: #1a1025; --bg2: #22133a; --card: rgba(34,18,58,0.88);
      --text: #f2deff; --muted: #c9a8e2; --accent: #ffb7c5; --purple: #c77dff;
      --border: rgba(199,125,255,0.22); --shadow: 0 4px 40px rgba(255,183,197,0.16);
      --glow: 0 0 28px rgba(255,183,197,0.42); --pglow: 0 0 28px rgba(199,125,255,0.4);
      --radius: 22px; --tr: 0.32s cubic-bezier(.4,0,.2,1);
      --fh: 'Mochiy Pop One', cursive; --fb: 'Nunito', sans-serif;
    }
    [data-theme="light"] {
      --bg: #fce8f3; --bg2: #f9d8eb; --card: rgba(255,245,252,0.93);
      --text: #3a1a2e; --muted: #7a4a68; --accent: #e05a82; --purple: #9b59b6;
      --border: rgba(224,90,130,0.22); --shadow: 0 4px 30px rgba(224,90,130,0.13);
      --glow: 0 0 24px rgba(224,90,130,0.38); --pglow: 0 0 24px rgba(155,89,182,0.35);
    }
    [data-anime="on"] {
      --accent: #ff4da6; --purple: #bf00ff; --border: rgba(191,0,255,0.32);
      --shadow: 0 4px 50px rgba(255,77,166,0.3); --glow: 0 0 40px rgba(255,77,166,0.6); --pglow: 0 0 40px rgba(191,0,255,0.55);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--fb); background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden; transition: background .5s, color .5s;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 60% 55% at 10% 10%, rgba(199,125,255,.14) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 45% at 90% 85%, rgba(255,183,197,.12) 0%, transparent 55%),
                  radial-gradient(ellipse 40% 40% at 55% 50%, rgba(168,237,234,.05) 0%, transparent 60%);
      transition: opacity .5s;
    }
    #vfx-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal, .star-vfx { position: absolute; }
    /* базовые анимации и компоненты – полные в оригинале, здесь для краткости */
    .fixed-top { position: fixed; top: 1rem; right: 1rem; display: flex; gap: .55rem; z-index: 200; }
    .icon-btn {
      width: 46px; height: 46px; border-radius: 50%; background: var(--card);
      border: 1.5px solid var(--border); cursor: pointer; font-size: 1.25rem;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(14px); box-shadow: var(--shadow); transition: all var(--tr); color: var(--text);
    }
    .icon-btn:hover { transform: scale(1.12) rotate(12deg); box-shadow: var(--glow); border-color: var(--accent); }
    .page-wrap { position: relative; z-index: 1; padding: 2.2rem 1rem 5rem; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 920px; display: flex; flex-direction: column; gap: 1.6rem; }
    nav.tabs {
      display: flex; gap: .55rem; flex-wrap: wrap; padding: .6rem; background: var(--card);
      border-radius: var(--radius); border: 1px solid var(--border); backdrop-filter: blur(14px); box-shadow: var(--shadow);
    }
    .tab {
      flex: 1; min-width: 80px; background: transparent; border: none; padding: .65rem 1.3rem;
      border-radius: calc(var(--radius) - 6px); cursor: pointer; font-weight: 800; font-family: var(--fh);
      font-size: .72rem; letter-spacing: .2px; color: var(--muted); transition: all var(--tr); white-space: nowrap; text-align: center;
    }
    .tab.active, .tab:hover { background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%); color: #fff; box-shadow: 0 0 22px rgba(255,183,197,.45); transform: translateY(-2px); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeSlide .42s ease; }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .card {
      background: var(--card); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow);
      border: 1px solid var(--border); backdrop-filter: blur(14px); transition: box-shadow var(--tr), border-color var(--tr);
      position: relative; overflow: hidden;
    }
    .card::before { /* shimmer */ }
    .card:hover { box-shadow: var(--glow), var(--shadow); border-color: var(--accent); }

    /* элементы био, спамера и т.д. идентичны предыдущему коду – пропущены для экономии места */
    /* В полной версии они есть, здесь только ключевые для аниме */

    .anime-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(145px,1fr)); gap:1rem; margin-top:1rem;
    }
    .anime-card {
      background: rgba(199,125,255,.06); border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border); transition: all var(--tr); cursor: pointer;
    }
    .anime-card:hover { transform: translateY(-4px); box-shadow: 0 0 20px rgba(255,183,197,0.4); border-color: var(--accent); }
    .anime-card img { width:100%; aspect-ratio: 2/3; object-fit:cover; display:block; }
    .anime-card .info { padding: 0.6rem; }
    .anime-card .title { font-weight: 800; font-size: 0.82rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .anime-card .meta { font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; }
    .player-view { display: none; }
    #episodeList { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 1rem 0; }
    #playerContainer { margin-top: 1rem; }
    #playerContainer iframe { width: 100%; height: 450px; border: none; border-radius: 16px; box-shadow: 0 0 20px rgba(255,183,197,0.3); }
    .source-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    .btn {
      border:none; cursor:pointer; font-weight:800; font-family:var(--fb); font-size:.83rem;
      padding: .76rem 1.4rem; border-radius:14px; transition: all var(--tr); position:relative; overflow:hidden;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%); color:#fff; box-shadow: 0 4px 22px rgba(255,183,197,.38); }
    .btn-primary:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 6px 32px rgba(255,183,197,.55); }
    .btn-outline { background:transparent; border:1.5px solid var(--border); color:var(--muted); }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); background:rgba(255,183,197,.09); }
    @media (max-width:660px) {
      .anime-grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); }
    }
  </style>
</head>
<body>
<div id="vfx-bg"></div>
<div class="fixed-top">
  <button class="icon-btn" id="themeToggle" title="Сменить тему">🌸</button>

          <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
            <input type="text" id="animeSearch" placeholder="Название аниме..."
                   style="flex:1; padding:0.7rem; border-radius:14px; border:1.5px solid var(--border); background: rgba(199,125,255,.07); color:var(--text);">
            <button class="btn btn-primary" id="animeSearchBtn">🔍 Искать</button>
          </div>

        <div id="playerView" class="player-view">

<script>
/* ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ========== */
const html = document.documentElement;
const vfxBg = document.getElementById('vfx-bg');

// темы, лепестки, неко и прочее – идентичны исходному коду
// Здесь приведены сокращённо для фокуса на аниме
(function() {
  // сакура
  for (let i=0; i<22; i++) {
    const el = document.createElement('div'); el.className='petal';
    el.style.cssText = `left:${Math.random()*100}vw; width:${8+Math.random()*11}px; height:${10+Math.random()*13}px; animation-duration:${7+Math.random()*11}s; animation-delay:${Math.random()*14}s`;
    vfxBg.appendChild(el);
  }
  // тема
  const saved = localStorage.getItem('theme')||'dark';
  html.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').textContent = saved==='dark'?'🌸':'🌙';
  document.getElementById('themeToggle').onclick = ()=>{
    const nxt = html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme', nxt);
    localStorage.setItem('theme', nxt);
    document.getElementById('themeToggle').textContent = nxt==='dark'?'🌸':'🌙';
  };
  // аниме-режим
  let animeOn = false;
  document.getElementById('animeModeBtn').onclick = ()=>{
    animeOn = !animeOn;
    html.setAttribute('data-anime', animeOn?'on':'off');
    document.getElementById('animeModeBtn').textContent = animeOn?'💫':'✨';
  };
  // табы
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
      document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab==='bio') fetchQuote();
    });
  });
  // цитаты
  const quotes = [
    { q:'Если не веришь в себя, то и не стоит начинать.', c:'Макака', a:'Доктор Стоун' },
    { q:'Настоящая сила — в умении защищать.', c:'Аска', a:'Евангелион' },
    { q:'Неважно, сколько у тебя таланта. Главное — желание.', c:'Мидория', a:'Моя геройская академия' },
    { q:'Даже в самой глубокой тьме можно найти свет.', c:'Тандзиро', a:'Клинок, рассекающий демонов' },
  ];
  function fetchQuote(){
    const f = quotes[Math.floor(Math.random()*quotes.length)];
    document.getElementById('quoteText').textContent = `"${f.q}"`;
    document.getElementById('quoteSrc').textContent = `— ${f.c} · ${f.a}`;
  }
  fetchQuote();
  // галерея waifu
  async function loadGallery(){
    const g = document.getElementById('gallery'); g.innerHTML = '';
    const cats = ['waifu','neko','shinobu','megumin'];
    for(let i=0;i<4;i++){
      const img = document.createElement('img');
      g.appendChild(img);
      try {
        const r = await fetch(`https://api.waifu.pics/sfw/${cats[Math.floor(Math.random()*cats.length)]}`);
        if(r.ok){ const d = await r.json(); if(d.url) img.src = d.url; }
      } catch(e){}
    }
  }
  loadGallery();
  // аватар
  (async ()=>{
    const avatar = document.getElementById('avatarImg');
    try {
      const r = await fetch('https://api.waifu.pics/sfw/waifu');
      if(r.ok){ const d = await r.json(); avatar.src = d.url; }
    } catch(e){}
  })();
  // неко
  const nekoImg = document.getElementById('nekoImg');
  async function fetchNeko() {
    try {
      const r = await fetch('https://nekos.life/api/v2/img/meow');
      if(r.ok){ const d = await r.json(); nekoImg.src = d.url; }
    } catch(e){}
  }
  fetchNeko();
  setInterval(fetchNeko, 30000);
})();

/* ========== АНИМЕ-ПЛЕЕР ========== */
const animeSearch = document.getElementById('animeSearch');
const animeSearchBtn = document.getElementById('animeSearchBtn');
const animeResults = document.getElementById('animeResults');
const catalogView = document.getElementById('catalogView');
const playerView = document.getElementById('playerView');
const backBtn = document.getElementById('backToCatalog');
const selectedTitle = document.getElementById('selectedAnimeTitle');
const sourceBtns = document.getElementById('sourceBtns');
const useAnilibriaBtn = document.getElementById('useAnilibria');
const useGogoBtn = document.getElementById('useGogo');
const sourceStatus = document.getElementById('sourceStatus');
const episodeList = document.getElementById('episodeList');
const playerContainer = document.getElementById('playerContainer');

// глобальные переменные для плеера
let hlsInstance = null;
let currentSearchResults = [];
let activeAnimeTitle = '';
let activeAnimeNames = [];

// === ПОИСК через Jikan ===
async function searchAnimeCatalog(query) {
  animeResults.innerHTML = '<p style="color:var(--muted)">🔍 Поиск...</p>';
  try {
    const resp = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=20`);
    const data = await resp.json();
    if (data.data?.length) {
      renderAnimeCards(data.data);
    } else {
      animeResults.innerHTML = '<p style="color:var(--muted)">Ничего не найдено</p>';
    }
  } catch (e) {
    animeResults.innerHTML = '<p style="color:#ff8fa3">Ошибка поиска</p>';
  }
}

function renderAnimeCards(list) {
  animeResults.innerHTML = '';
  list.forEach(anime => {
    const card = document.createElement('div');
    card.className = 'anime-card';
    card.innerHTML = `
      <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
      <div class="info">
        <div class="title">${anime.title}</div>
        <div class="meta">${anime.year||'?'} · ${anime.type||''}</div>
      </div>`;
    card.addEventListener('click', () => {
      activeAnimeTitle = anime.title;
      activeAnimeNames = [anime.title, anime.title_english, anime.title_japanese].filter(Boolean);
      showPlayerView(anime.title);
    });
    animeResults.appendChild(card);
  });
}

// === НАВИГАЦИЯ между видами ===
function showCatalogView() {
  catalogView.style.display = 'block';
  playerView.style.display = 'none';
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  playerContainer.innerHTML = '';
}

function showPlayerView(title) {
  catalogView.style.display = 'none';
  playerView.style.display = 'block';
  selectedTitle.textContent = title;
  sourceStatus.textContent = 'Выберите источник';
  episodeList.innerHTML = '';
  playerContainer.innerHTML = '';
  // сброс активного источника
  currentAnilibriaId = null;
  currentGogoSlug = null;
}

backBtn.addEventListener('click', showCatalogView);

// === ИСТОЧНИК ANILIBRIA ===
const ANILIBRIA_API = 'https://api.anilibria.top/v3';
let currentAnilibriaId = null;

useAnilibriaBtn.addEventListener('click', () => {
  sourceStatus.textContent = 'Ищем на AniLibria...';
  episodeList.innerHTML = '';
  playerContainer.innerHTML = '';
  searchOnAnilibria(activeAnimeNames);
});

async function searchOnAnilibria(names) {
  const queue = [...new Set(names.flatMap(n => {
    if (!n) return [];
    const cleaned = n.replace(/\s*\(\d{4}\)\s*/g, '').replace(/\s*(season|part|cour)\s*\d*/gi, '').trim();
    return [cleaned, ...(cleaned.split(/\s+/).length>2 ? [cleaned.split(/\s+/).slice(0,2).join(' ')] : []), cleaned.split(/\s+/)[0]];
  }))];
  for (const q of queue) {
    try {
      const resp = await fetch(`${ANILIBRIA_API}/title/search?search=${encodeURIComponent(q)}&limit=10`);
      if (!resp.ok) continue;
      const raw = await resp.json();
      const list = Array.isArray(raw) ? raw : (raw.list || []);
      if (!list.length) continue;
      // берём первый результат
      const best = list[0];
      currentAnilibriaId = best.id;
      sourceStatus.innerHTML = `✅ Найдено: ${best.names?.ru || best.names?.en || q}`;
      loadAnilibriaEpisodes(best.id);
      return;
    } catch (e) {}
  }
  sourceStatus.innerHTML = '<span style="color:#ff8fa3">❌ Не найдено в AniLibria</span>';
}

async function loadAnilibriaEpisodes(animeId) {
  episodeList.innerHTML = 'Загружаем серии...';
  try {
    const resp = await fetch(`${ANILIBRIA_API}/title?id=${animeId}&playlist_type=array`);
    if (!resp.ok) throw new Error('Ошибка');
    const data = await resp.json();
    const playerList = data?.player?.list;
    if (!playerList || !Object.keys(playerList).length) {
      episodeList.innerHTML = 'Серии не найдены';
      return;
    }
    const cdnHost = (data.player?.host?.startsWith('http') ? data.player.host : `https://${data.player.host || 'cache.libria.fun'}`);
    const episodes = Array.isArray(playerList) ? playerList : Object.values(playerList);
    episodeList.innerHTML = '';
    episodes.sort((a,b) => +a.episode - +b.episode).forEach(ep => {
      const hlsPath = ep.hls?.fhd || ep.hls?.hd || ep.hls?.sd;
      if (!hlsPath) return;
      const url = hlsPath.startsWith('http') ? hlsPath : `${cdnHost}${hlsPath}`;
      const btn = document.createElement('button');
      btn.className = 'btn btn-outline';
      btn.textContent = `▶ Серия ${ep.episode}`;
      btn.addEventListener('click', () => playAnilibriaHLS(url));
      episodeList.appendChild(btn);
    });
    if (!episodeList.children.length) episodeList.innerHTML = 'Нет доступных серий';
  } catch (e) {
    episodeList.innerHTML = 'Ошибка загрузки эпизодов';
  }
}

function playAnilibriaHLS(url) {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  playerContainer.innerHTML = `<video id="hlsVideo" controls playsinline style="width:100%; border-radius:16px; background:#000;"></video>`;
  const video = document.getElementById('hlsVideo');
  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: false });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    hls.on(Hls.Events.ERROR, (_,d) => { if (d.fatal) playerContainer.innerHTML += '<small style="color:#ff8fa3">Ошибка HLS</small>'; });
    hlsInstance = hls;
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  }
}

// === ИСТОЧНИК GOGOANIME (скрапинг) ===
const GOGO_DOMAIN = 'gogoanime3.co';
const CORS_PROXY = 'https://corsproxy.io/?';
let currentGogoSlug = null;

useGogoBtn.addEventListener('click', () => {
  sourceStatus.textContent = 'Ищем на Gogo (скрапинг)...';
  episodeList.innerHTML = '';
  playerContainer.innerHTML = '';
  searchGogoByNames(activeAnimeNames);
});

async function fetchHTML(url) {
  const res = await fetch(CORS_PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error(`Status ${res.status}`);
  return new DOMParser().parseFromString(await res.text(), 'text/html');
}

async function searchGogoByNames(names) {
  for (const name of names) {
    if (!name) continue;
    try {
      const doc = await fetchHTML(`https://${GOGO_DOMAIN}/search.html?keyword=${encodeURIComponent(name)}`);
      const firstLink = doc.querySelector('.last_episodes ul li p.name a');
      if (firstLink) {
        const href = firstLink.getAttribute('href');
        currentGogoSlug = href.replace('/category/', '').replace(/\/$/, '');
        sourceStatus.innerHTML = `✅ Найдено на Gogo: ${firstLink.textContent.trim()}`;
        loadGogoEpisodes(currentGogoSlug);
        return;
      }
    } catch (e) {}
  }
  sourceStatus.innerHTML = '<span style="color:#ff8fa3">❌ Не найдено на Gogo</span>';
}

async function loadGogoEpisodes(slug) {
  episodeList.innerHTML = 'Загружаем серии...';
  try {
    const doc = await fetchHTML(`https://${GOGO_DOMAIN}/category/${slug}`);
    const epList = doc.querySelector('#episode_related, .anime_video_body ul');
    if (!epList) { episodeList.innerHTML = 'Список серий не найден'; return; }
    const items = Array.from(epList.querySelectorAll('li a')).reverse();
    episodeList.innerHTML = '';
    items.forEach(a => {
      const epText = a.textContent.trim();
      const epNum = epText.match(/\d+/)?.[0] || epText;
      const href = a.getAttribute('href');
      const embedUrl = `https://${GOGO_DOMAIN}${href.replace('/watch/', '/embed/')}`;
      const btn = document.createElement('button');
      btn.className = 'btn btn-outline';
      btn.textContent = `▶ Серия ${epNum}`;
      btn.addEventListener('click', () => showGogoPlayer(embedUrl));
      episodeList.appendChild(btn);
    });
  } catch (e) {
    episodeList.innerHTML = 'Ошибка загрузки';
  }
}

function showGogoPlayer(url) {
  playerContainer.innerHTML = `<iframe src="${url}" allowfullscreen
    style="width:100%; height:450px; border:none; border-radius:16px;"></iframe>`;
}

// === поиск при вводе ===
animeSearchBtn.addEventListener('click', () => {
  const q = animeSearch.value.trim();
  if (q) searchAnimeCatalog(q);
});
animeSearch.addEventListener('keypress', e => { if (e.key==='Enter') animeSearchBtn.click(); });

// заглушка спамера
document.getElementById('startBtn')?.addEventListener('click', ()=>{
  document.getElementById('log').innerHTML += '<br>Спамер (заглушка)';
});
