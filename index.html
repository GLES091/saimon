<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a0a2e">
  <title>GOD_AE86 ✦ Аниме Гача Эстетика</title>
  <style>
    :root {
      --bg: #0a0a14;
      --surface: rgba(18, 12, 35, 0.7);
      --surface2: rgba(30, 25, 55, 0.8);
      --text: #f0e6ff;
      --text2: #b0a0d0;
      --accent: #ff6eb4;
      --accent2: #c44dff;
      --accent3: #00e5ff;
      --gold: #ffd700;
      --rare: #8bc34a;
      --epic: #ab47bc;
      --legendary: #ff9100;
      --glass: rgba(18, 12, 35, 0.65);
      --glass-border: rgba(255, 110, 180, 0.25);
      --shadow: 0 20px 50px rgba(0,0,0,0.7);
      --radius: 20px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .theme-light {
      --bg: #f5f0ff; --surface: rgba(255,255,255,0.7); --surface2: rgba(240,232,255,0.85);
      --text: #2a1a3a; --text2: #5a4a6a; --glass-border: rgba(180,130,220,0.3);
    }
    .theme-anime {
      --bg: #1a0a1e; --surface: rgba(30,15,40,0.75); --surface2: rgba(40,22,55,0.8);
      --text: #ffe0f0; --text2: #e0b0d0; --accent: #ff80c0; --accent2: #ff50b0; --accent3: #ffb0d0;
      --glass-border: rgba(255,130,180,0.35);
    }
    .theme-vergil {
      --bg: #000810; --surface: rgba(0,15,30,0.8); --surface2: rgba(0,20,40,0.85);
      --text: #c0e0ff; --text2: #80b0d0; --accent: #0099ff; --accent2: #0066cc; --accent3: #00ccff;
      --glass-border: rgba(0,150,255,0.35);
    }
    .theme-saya {
      --bg: #0a0000; --surface: rgba(20,0,5,0.8); --surface2: rgba(35,5,15,0.85);
      --text: #ffcccc; --text2: #cc8888; --accent: #ff2244; --accent2: #cc0033; --accent3: #ff4466;
      --glass-border: rgba(255,30,50,0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: var(--font); background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      transition: background var(--transition), color var(--transition);
    }
    canvas#bgCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events: none; opacity: 0.8;
    }
    .app-container {
      position: relative; z-index: 1; max-width: 960px; margin: 0 auto;
      padding: 20px; display: flex; flex-direction: column; gap: 24px; height: 100vh;
    }
    /* header */
    .header {
      text-align: center; padding: 15px 10px 0;
    }
    .logo-text {
      font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900; letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 25px var(--accent2)); animation: logoGlow 3s ease-in-out infinite;
    }
    @keyframes logoGlow {
      0%,100% { filter: drop-shadow(0 0 25px var(--accent2)); }
      50% { filter: drop-shadow(0 0 55px var(--accent)); }
    }
    .subtitle { font-size: 0.9rem; letter-spacing: 5px; color: var(--text2); margin-top: 4px; }
    .theme-switcher {
      display: flex; gap: 10px; justify-content: center; margin-top: 12px; flex-wrap: wrap;
    }
    .theme-btn {
      width: 44px; height: 44px; border-radius: 50%; border: 2px solid transparent;
      cursor: pointer; transition: all var(--transition); font-size: 1.3rem;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2); color: var(--text); backdrop-filter: blur(8px);
    }
    .theme-btn.active {
      border-color: var(--accent); box-shadow: 0 0 25px var(--accent);
      background: var(--accent); color: #000; transform: scale(1.1);
    }
    /* tabs */
    .tab-nav {
      display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
      background: var(--surface); backdrop-filter: blur(16px);
      border-radius: 60px; padding: 6px; margin: 10px 0;
      border: 1px solid var(--glass-border); box-shadow: var(--shadow);
    }
    .tab-btn {
      padding: 12px 18px; border-radius: 60px; border: none; cursor: pointer;
      font-weight: 600; font-size: 0.95rem; background: transparent; color: var(--text2);
      transition: all var(--transition); display: flex; align-items: center; gap: 6px;
    }
    .tab-btn.active {
      background: var(--accent); color: #000; box-shadow: 0 8px 20px rgba(196,77,255,0.5);
      transform: scale(1.02);
    }
    .tab-content {
      background: var(--surface); backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border); border-radius: var(--radius);
      padding: 24px; box-shadow: var(--shadow); flex: 1; overflow-y: auto;
      position: relative;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
    /* cards inside */
    .card { background: var(--surface2); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    .btn {
      padding: 12px 22px; border-radius: 60px; border: none; cursor: pointer;
      font-weight: 700; font-size: 0.9rem; letter-spacing: 1px;
      transition: all var(--transition); background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff; box-shadow: 0 6px 18px rgba(196,77,255,0.4); text-transform: uppercase;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(255,110,180,0.6); }
    .btn.secondary { background: var(--surface2); color: var(--text); box-shadow: none; border: 1px solid var(--glass-border); }
    .btn.danger { background: linear-gradient(135deg, #ff1744, #ff5252); }
    .crystals { background: var(--surface2); padding: 8px 16px; border-radius: 60px; font-weight: 700; color: var(--accent3); }
    .gacha-result { min-height: 200px; background: var(--surface2); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 16px 0; overflow: hidden; }
    .gacha-result img { max-width: 100%; max-height: 300px; border-radius: 12px; animation: fadeIn 0.5s; }
    .inventory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; max-height: 200px; overflow-y: auto; }
    .inventory-item { aspect-ratio: 1; border-radius: 10px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .inventory-item:hover { border-color: var(--accent); transform: scale(1.1); }
    .inventory-item img { width:100%; height:100%; object-fit: cover; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .gallery-grid img { width:100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 12px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
    .gallery-grid img:hover { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 10px 30px rgba(255,110,180,0.5); }
    .neko-float {
      position: fixed; bottom: 25px; right: 25px; width: 65px; height: 65px; border-radius: 50%;
      cursor: pointer; z-index: 100; overflow: hidden; border: 3px solid var(--accent);
      box-shadow: 0 0 35px rgba(255,110,180,0.6); animation: float 4s ease-in-out infinite;
      background: var(--surface);
    }
    .neko-float img { width:100%; height:100%; object-fit: cover; }
    .neko-float:hover { transform: scale(1.2); box-shadow: 0 0 60px rgba(255,110,180,1); }
    @keyframes float { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-15px); } }
    .player-visualizer { display: flex; align-items: flex-end; gap: 3px; height: 50px; background: var(--surface2); border-radius: 25px; padding: 8px; }
    .bar { flex:1; background: linear-gradient(to top, var(--accent), var(--accent2)); border-radius: 2px 2px 0 0; transition: height 0.08s; }
    .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:1000; justify-content:center; align-items:center; }
    .lightbox.active { display:flex; } .lightbox img { max-width:90%; max-height:85vh; border-radius:20px; }
    .toast { padding: 12px 20px; border-radius: 60px; background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: var(--text); font-weight:600; }
    @media (max-width: 600px) {
      .tab-btn { padding: 10px 14px; font-size: 0.8rem; }
      .neko-float { width: 50px; height: 50px; bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body class="theme-anime">
<canvas id="bgCanvas"></canvas>
<div id="toastContainer" style="position:fixed; top:20px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:10px;"></div>
<div class="lightbox" id="lightbox"><span style="position:absolute;top:20px;right:30px;font-size:3rem;color:#fff;cursor:pointer;" onclick="this.parentElement.classList.remove('active')">&times;</span><img src="" alt=""></div>
<div class="neko-float" id="nekoFloat"><img src="" alt="neko" id="nekoImg"></div>

<div class="app-container">
  <header class="header">
    <div class="logo-text">GOD_AE86 ✦</div>
    <p class="subtitle">アニメ ✦ ガチャ ✦ エステティック</p>
    <div class="theme-switcher" id="themeSwitcher">
      <button class="theme-btn active" data-theme="anime">🌸</button>
      <button class="theme-btn" data-theme="light">🌙</button>
      <button class="theme-btn" data-theme="vergil">⚔️</button>
      <button class="theme-btn" data-theme="saya">🧠</button>
    </div>
  </header>

  <!-- TAB NAVIGATION -->
  <div class="tab-nav" id="tabNav">
    <button class="tab-btn active" data-tab="gacha">🎲 Гача</button>
    <button class="tab-btn" data-tab="gallery">🎴 Галерея</button>
    <button class="tab-btn" data-tab="osint">🕵️ OSINT</button>
    <button class="tab-btn" data-tab="player">🎀 Плеер</button>
    <button class="tab-btn" data-tab="quotes">💬 Цитаты</button>
    <button class="tab-btn" data-tab="ip">🔍 IP</button>
  </div>

  <!-- TAB CONTENT -->
  <div class="tab-content">
    <!-- Гача -->
    <div class="tab-pane active" id="tab-gacha">
      <div class="card">
        <h2>🎲 Аниме-гача</h2>
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
          <span class="crystals">💎 <span id="crystalCount">0</span></span>
          <button class="btn secondary" id="dailyBtn" onclick="claimDaily()">Собрать дейлик +500 💎</button>
        </div>
        <div class="gacha-result" id="gachaResult"><p>Нажми «Крутить» за 100 💎</p></div>
        <button class="btn" id="rollBtn" onclick="rollGacha()" style="width:100%;">🎰 Крутить (100 💎)</button>
        <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
          <span>Инвентарь (<span id="invCount">0</span>)</span>
          <button class="btn danger" style="padding:8px 16px;" onclick="clearInventory()">Очистить</button>
        </div>
        <div class="inventory-grid" id="inventoryGrid"></div>
      </div>
    </div>
    <!-- Галерея -->
    <div class="tab-pane" id="tab-gallery">
      <div class="card">
        <h2>🎴 Бесконечная галерея</h2>
        <div id="galleryControls" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;"></div>
        <div class="gallery-grid" id="galleryGrid"></div>
        <button class="btn" style="width:100%; margin-top:14px;" id="loadMoreGallery">Загрузить ещё ⬇️</button>
      </div>
    </div>
    <!-- OSINT -->
    <div class="tab-pane" id="tab-osint">
      <div class="card">
        <h2>🕵️ OSINT-инструменты</h2>
        <select id="osintType" style="width:100%; padding:12px; border-radius:60px; background:var(--surface2); color:var(--text); border:1px solid var(--glass-border); margin-bottom:10px;">
          <option value="ip">IP информация</option>
          <option value="whois">Whois домена</option>
          <option value="dns">DNS-записи (A)</option>
          <option value="nickname">Поиск по никнейму</option>
          <option value="dork">Google Dorking</option>
        </select>
        <input type="text" id="osintQuery" placeholder="IP, домен, ник или дорк..." style="width:100%; padding:12px; border-radius:60px; background:var(--surface2); color:var(--text); border:1px solid var(--glass-border); margin-bottom:12px;">
        <button class="btn" style="width:100%;" onclick="runOSINT()">Выполнить 🚀</button>
        <div id="osintResult" style="display:none; margin-top:12px; font-family:var(--font-mono); background:var(--surface2); padding:16px; border-radius:14px; max-height:250px; overflow:auto; white-space:pre-wrap;"></div>
        <button class="btn secondary" id="copyOsintBtn" style="width:100%; margin-top:8px; display:none;" onclick="copyOSINT()">Скопировать 📋</button>
      </div>
    </div>
    <!-- Плеер -->
    <div class="tab-pane" id="tab-player">
      <div class="card">
        <h2>🎀 Музыкальный плеер</h2>
        <div style="display:flex; gap:16px; flex-wrap:wrap; align-items:center;">
          <div class="player-visualizer" id="visualizer" style="flex:1; min-width:200px;"></div>
          <div style="display:flex; gap:10px;">
            <button class="btn" id="playBtn" onclick="togglePlay()">▶️ Играть</button>
            <input type="file" accept="audio/*" id="audioFileInput" style="display:none;" onchange="loadAudioFile(event)">
            <button class="btn secondary" onclick="document.getElementById('audioFileInput').click()">📁 Загрузить</button>
          </div>
        </div>
        <p id="playerStatus" style="margin-top:10px; color:var(--text2);">Файл не загружен.</p>
      </div>
    </div>
    <!-- Цитаты -->
    <div class="tab-pane" id="tab-quotes">
      <div class="card">
        <h2>💬 Цитаты из аниме</h2>
        <div id="quoteBox" style="font-style:italic; font-size:1.1rem; padding:16px; background:var(--surface2); border-radius:12px; border-left:4px solid var(--accent); min-height:80px;">Загрузка...</div>
        <button class="btn" style="margin-top:12px; width:100%;" onclick="nextQuote()">Следующая цитата ✨</button>
      </div>
    </div>
    <!-- IP -->
    <div class="tab-pane" id="tab-ip">
      <div class="card">
        <h2>🔍 Мой IP</h2>
        <div id="ipDisplay" style="font-family:var(--font-mono); background:var(--surface2); padding:16px; border-radius:14px; white-space:pre-wrap;">Загрузка...</div>
        <button class="btn" style="margin-top:10px;" onclick="fetchIP()">Обновить 🔄</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    // Canvas & VFX
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let vfxType = 'petals'; 
    let particles = [];
    function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();
    function initCanvasVFX() {
      const theme = STATE.theme;
      vfxType = theme === 'anime' ? 'petals' : theme === 'light' ? 'stars' : theme === 'vergil' ? 'slashes' : 'blood';
      particles = [];
      for (let i=0; i<55; i++) createParticle();
    }
    function createParticle() {
      const p = { x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*5+2, speedX: (Math.random()-0.5)*1.8, speedY: Math.random()*2.2+0.6, opacity: Math.random()*0.7+0.3, rotation: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.06 };
      if (vfxType==='petals') p.color = `hsl(${330+Math.random()*30}, 80%, 70%)`;
      else if (vfxType==='stars') p.color = `hsl(${45+Math.random()*20}, 90%, 80%)`;
      else if (vfxType==='slashes') { p.color = `hsl(${200+Math.random()*30}, 100%, 65%)`; p.speedY=0; p.speedX=(Math.random()-0.5)*7; }
      else p.color = `hsl(${0+Math.random()*10}, 90%, 45%)`;
      particles.push(p);
    }
    function animateCanvas() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p => {
        p.x += p.speedX; p.y += p.speedY; p.rotation += p.rotSpeed;
        if (p.y > canvas.height+20) { p.y=-20; p.x=Math.random()*canvas.width; }
        if (p.x > canvas.width+20) p.x=-20; if (p.x<-20) p.x=canvas.width+20;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rotation); ctx.globalAlpha=p.opacity; ctx.fillStyle=p.color;
        if (vfxType==='petals') { ctx.beginPath(); ctx.ellipse(0,0,p.size,p.size*0.5,0,0,Math.PI*2); ctx.fill(); }
        else if (vfxType==='slashes') ctx.fillRect(-p.size*1.5, -1.5, p.size*3, 3);
        else { ctx.beginPath(); ctx.arc(0,0,p.size,0,Math.PI*2); ctx.fill(); }
        ctx.restore();
      });
      if (particles.length<60) createParticle(); if(particles.length>65) particles.splice(0,5);
      requestAnimationFrame(animateCanvas);
    }
    initCanvasVFX(); animateCanvas();

    // STATE
    const STATE = {
      crystals: parseInt(localStorage.getItem('gacha_crystals')||'500'),
      inventory: JSON.parse(localStorage.getItem('gacha_inventory')||'[]'),
      lastDaily: localStorage.getItem('gacha_lastDaily')||'',
      theme: localStorage.getItem('theme')||'anime',
      galleryCat: 'waifu',
      galleryPage: {waifu:1,neko:1,shinobu:1,megumin:1,dance:1,cuddle:1,smug:1},
      audioCtx:null, audioSource:null, isPlaying:false, analyser:null, animationId:null,
      activeTab: localStorage.getItem('activeTab')||'gacha'
    };
    function saveState() {
      localStorage.setItem('gacha_crystals', STATE.crystals);
      localStorage.setItem('gacha_inventory', JSON.stringify(STATE.inventory));
      localStorage.setItem('gacha_lastDaily', STATE.lastDaily);
      localStorage.setItem('theme', STATE.theme);
      localStorage.setItem('activeTab', STATE.activeTab);
    }

    // Toast
    function showToast(msg, type='info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
      if(type==='success') t.style.borderColor='#8bc34a';
      if(type==='error') t.style.borderColor='#ff1744';
      c.appendChild(t); setTimeout(()=>t.remove(), 3000);
    }

    // Theme
    function applyTheme(theme) {
      document.body.className = ''; if(theme!=='anime') document.body.classList.add('theme-'+theme); else document.body.classList.add('theme-anime');
      STATE.theme=theme; saveState();
      document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active', b.dataset.theme===theme));
      initCanvasVFX();
    }
    document.getElementById('themeSwitcher').addEventListener('click', e=>{
      const btn = e.target.closest('.theme-btn'); if(btn) applyTheme(btn.dataset.theme);
    });
    applyTheme(STATE.theme);

    // Tabs
    function switchTab(tabId) {
      document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      const pane = document.getElementById('tab-'+tabId);
      if(pane) pane.classList.add('active');
      const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
      if(btn) btn.classList.add('active');
      STATE.activeTab = tabId; saveState();
      if(tabId==='gallery' && document.getElementById('galleryGrid').children.length===0) loadGallery('waifu',1);
      if(tabId==='ip') fetchIP();
    }
    document.getElementById('tabNav').addEventListener('click', e=>{
      const btn = e.target.closest('.tab-btn'); if(!btn) return;
      switchTab(btn.dataset.tab);
    });
    switchTab(STATE.activeTab);

    // Gacha
    function updateCrystals() { document.getElementById('crystalCount').textContent=STATE.crystals; document.getElementById('rollBtn').disabled=STATE.crystals<100; saveState(); }
    function updateInventory() {
      const grid=document.getElementById('inventoryGrid'); document.getElementById('invCount').textContent=STATE.inventory.length;
      grid.innerHTML = STATE.inventory.slice(-30).map(item=>`<div class="inventory-item"><img src="${item.url}" loading="lazy"></div>`).join('');
    }
    window.rollGacha = ()=>{
      if(STATE.crystals<100) return showToast('Недостаточно кристаллов','error');
      STATE.crystals-=100; updateCrystals();
      const r=Math.random()*100, cat=r<60?'waifu':r<90?'neko':r<99?'shinobu':'megumin';
      const rarity=r<60?'Обычная':r<90?'Редкая':r<99?'Эпическая':'Легендарная';
      document.getElementById('gachaResult').innerHTML='<p>Крутим...</p>';
      fetch(`https://api.waifu.pics/sfw/${cat}`).then(r=>r.json()).then(data=>{
        STATE.inventory.push({url:data.url, rarity});
        updateInventory();
        document.getElementById('gachaResult').innerHTML=`<img src="${data.url}"><span style="position:absolute; top:10px; right:10px; background:${rarity==='Легендарная'?'#ffd700':rarity==='Эпическая'?'#ab47bc':rarity==='Редкая'?'#8bc34a':'#666'}; padding:4px 14px; border-radius:60px;">${rarity}</span>`;
        if(rarity==='Легендарная') showToast('🎉 ЛЕГЕНДАРНАЯ!');
      }).catch(()=>{ showToast('Ошибка (CORS). Запустите через сервер.','error'); STATE.crystals+=100; updateCrystals(); });
    };
    window.claimDaily = ()=>{
      const today=new Date().toDateString();
      if(STATE.lastDaily===today) return showToast('Уже собрано','error');
      STATE.lastDaily=today; STATE.crystals+=500; updateCrystals(); showToast('+500 💎','success');
    };
    window.clearInventory = ()=>{ STATE.inventory=[]; updateInventory(); document.getElementById('gachaResult').innerHTML='<p>Нажми «Крутить»</p>'; };
    updateCrystals(); updateInventory();

    // Gallery
    const galleryCats = ['waifu','neko','shinobu','megumin','dance','cuddle','smug'];
    const galleryControls = document.getElementById('galleryControls');
    galleryControls.innerHTML = galleryCats.map(c=>`<button class="btn secondary" data-cat="${c}">${c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join('');
    galleryControls.addEventListener('click', e=>{
      const btn=e.target.closest('button'); if(!btn||!btn.dataset.cat) return;
      document.querySelectorAll('#galleryControls .btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
      STATE.galleryCat=btn.dataset.cat; loadGallery(STATE.galleryCat,1);
    });
    function loadGallery(cat, page, append=false) {
      const grid=document.getElementById('galleryGrid');
      if(!append) grid.innerHTML='<p>Загрузка...</p>';
      const promises = Array.from({length:8}, ()=>fetch(`https://api.waifu.pics/sfw/${cat}`).then(r=>r.json()).then(d=>d.url));
      Promise.all(promises).then(urls=>{
        const html = urls.map(u=>`<img src="${u}" onclick="openLightbox('${u}')" loading="lazy">`).join('');
        if(append) grid.innerHTML+=html; else grid.innerHTML=html;
        STATE.galleryPage[cat]=page;
      }).catch(()=>{ if(!append) grid.innerHTML='<p style="color:#ff5252;">Ошибка загрузки. Нужен http-сервер.</p>'; });
    }
    document.getElementById('loadMoreGallery').addEventListener('click', ()=>{
      STATE.galleryPage[STATE.galleryCat]=(STATE.galleryPage[STATE.galleryCat]||1)+1;
      loadGallery(STATE.galleryCat, STATE.galleryPage[STATE.galleryCat], true);
    });
    window.openLightbox = url => { const lb=document.getElementById('lightbox'); lb.querySelector('img').src=url; lb.classList.add('active'); };
    document.querySelector('#galleryControls .btn[data-cat="waifu"]')?.classList.add('active');

    // IP
    window.fetchIP = ()=>{
      document.getElementById('ipDisplay').textContent='Загрузка...';
      fetch('https://ipapi.co/json/').then(r=>r.json()).then(d=>{
        document.getElementById('ipDisplay').textContent = `IP: ${d.ip}\nСтрана: ${d.country_name}\nГород: ${d.city}\nПровайдер: ${d.org}`;
      }).catch(()=> document.getElementById('ipDisplay').textContent='Ошибка. Возможно, нужен http-сервер.');
    };

    // OSINT
    window.runOSINT = ()=>{
      const type=document.getElementById('osintType').value, query=document.getElementById('osintQuery').value.trim();
      const res=document.getElementById('osintResult'), copy=document.getElementById('copyOsintBtn');
      res.style.display='block'; copy.style.display='block'; res.textContent='Выполнение...';
      if(!query && type!=='nickname') { res.textContent='Введите запрос'; return; }
      if(type==='nickname') { window.open(`https://whatsmyname.app/?q=${encodeURIComponent(query||'test')}`, '_blank'); res.textContent='Открыт whatsmyname.app'; return; }
      if(type==='dork') { res.innerHTML = `Поиск: <a href="https://www.google.com/search?q=${encodeURIComponent(query)}" target="_blank">Google</a> | <a href="https://duckduckgo.com/?q=${encodeURIComponent(query)}" target="_blank">DuckDuckGo</a>`; return; }
      let url = type==='ip'?`https://ipapi.co/${query}/json/`: type==='whois'?`https://api.hackertarget.com/whois/?q=${query}`:`https://dns.google/resolve?name=${query}&type=A`;
      fetch(url).then(r=>r.text()).then(t=>{ try{ res.textContent=JSON.stringify(JSON.parse(t),null,2); }catch{ res.textContent=t; } }).catch(e=>res.textContent='Ошибка: '+e.message);
    };
    window.copyOSINT = ()=>{ const t=document.getElementById('osintResult').textContent; navigator.clipboard.writeText(t).then(()=>showToast('Скопировано!')).catch(()=>showToast('Ошибка')); };

    // Player
    function initAudio() { if(!STATE.audioCtx){ STATE.audioCtx=new (window.AudioContext||window.webkitAudioContext)(); STATE.analyser=STATE.audioCtx.createAnalyser(); STATE.analyser.fftSize=64; STATE.analyser.connect(STATE.audioCtx.destination); } }
    window.loadAudioFile = e=>{
      const file=e.target.files[0]; if(!file) return; initAudio();
      const reader=new FileReader();
      reader.onload=ev=>STATE.audioCtx.decodeAudioData(ev.target.result, buffer=>{
        if(STATE.audioSource) STATE.audioSource.disconnect();
        STATE.audioSource=STATE.audioCtx.createBufferSource(); STATE.audioSource.buffer=buffer;
        STATE.audioSource.connect(STATE.analyser); STATE.audioSource.loop=true;
        document.getElementById('playerStatus').textContent=`Готово: ${file.name}`;
      });
      reader.readAsArrayBuffer(file);
    };
    window.togglePlay = ()=>{
      if(!STATE.audioSource) return showToast('Загрузите аудио','error');
      if(STATE.isPlaying){ STATE.audioSource.stop(); STATE.audioSource=STATE.audioCtx.createBufferSource(); STATE.audioSource.buffer=STATE.audioSource.buffer; STATE.audioSource.connect(STATE.analyser); STATE.audioSource.start(0); }
      else { STATE.audioSource.start(0); STATE.isPlaying=true; }
      document.getElementById('playBtn').textContent=STATE.isPlaying?'⏸️ Пауза':'▶️ Играть';
      if(!STATE.animationId) visualize();
    };
    function visualize(){
      const bars = document.querySelectorAll('#visualizer .bar');
      if(!bars.length) { const v=document.getElementById('visualizer'); for(let i=0;i<16;i++){ const b=document.createElement('div'); b.className='bar'; b.style.height='10%'; v.appendChild(b); } }
      const data = new Uint8Array(STATE.analyser.frequencyBinCount);
      function update(){ STATE.analyser.getByteFrequencyData(data); document.querySelectorAll('#visualizer .bar').forEach((b,i)=>{ b.style.height=Math.max(3,(data[i%data.length]/255)*100)+'%'; }); STATE.animationId=requestAnimationFrame(update); }
      update();
    }
    (function(){ const v=document.getElementById('visualizer'); for(let i=0;i<16;i++){ const b=document.createElement('div'); b.className='bar'; b.style.height='10%'; v.appendChild(b); } })();

    // Quotes
    const quotes = [
      {text:'«Даже если я потеряю память, моё тело будет помнить тебя.»', char:'— Эльза, Re:Zero'},
      {text:'«Мир не идеален. Но он существует и борется за то, чтобы стать лучше.»', char:'— Рой Мустанг'},
      {text:'«Лучше умереть стоя, чем жить на коленях.»', char:'— Спайк Шпигель'},
      {text:'«Если у тебя есть причина жить, ты сможешь вынести почти всё.»', char:'— Канеки Кен'},
      {text:'«Сила — это не просто физическая мощь. Это воля идти до конца.»', char:'— Гатс'}
    ];
    let qi=0;
    window.nextQuote = ()=>{ qi=(qi+1)%quotes.length; const q=quotes[qi]; document.getElementById('quoteBox').innerHTML=`${q.text}<br><small style="opacity:0.7;">${q.char}</small>`; };
    nextQuote();

    // Neko
    function fetchNeko() { fetch('https://api.waifu.pics/sfw/neko').then(r=>r.json()).then(d=>{ document.getElementById('nekoImg').src=d.url; }).catch(()=>{}); }
    document.getElementById('nekoFloat').addEventListener('click', ()=>{ fetchNeko(); showToast('Мяу! 🐾'); });
    fetchNeko(); setInterval(fetchNeko, 45000);

    // PWA
    const link = document.createElement('link'); link.rel='manifest';
    link.href = 'data:application/json;base64,' + btoa(JSON.stringify({name:'GOD_AE86 ✦',short_name:'GOD_AE86',start_url:'.',display:'standalone',background_color:'#1a0a2e',theme_color:'#ff6eb4'}));
    document.head.appendChild(link);
    if('serviceWorker' in navigator) {
      const sw = new Blob([`self.addEventListener('install',e=>e.waitUntil(caches.open('v1').then(c=>c.addAll(['/'])).then(()=>self.skipWaiting()))); self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`],{type:'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(sw)).catch(()=>{});
    }
  })();
</script>
</body>
</html>
