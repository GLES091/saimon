<script>
/* ═══════ ИСПРАВЛЕНИЯ ═══════ */
(function() {
  // Вспомогательная функция для безопасной загрузки изображений
  function setImageWithFallback(imgElement, src, fallbackSvg) {
    imgElement.src = src;
    imgElement.onerror = function() {
      if (fallbackSvg) imgElement.src = 'data:image/svg+xml,' + encodeURIComponent(fallbackSvg);
      imgElement.style.opacity = '1';
    };
    imgElement.onload = function() {
      imgElement.style.opacity = '1';
    };
  }

  // Заглушка для аватара
  const AVATAR_FALLBACK = `<svg xmlns="http://www.w3.org/2000/svg" width="155" height="155" viewBox="0 0 155 155"><rect fill="#22133a" width="155" height="155"/><text x="77" y="80" text-anchor="middle" fill="#c77dff" font-size="30">★</text></svg>`;
  const WAIFU_FALLBACK = `<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><rect fill="#1a1025" width="200" height="200"/><text x="100" y="100" text-anchor="middle" fill="#ffb7c5" font-size="20">🌸</text></svg>`;

  // Загрузка аватара
  const avatarImg = document.getElementById('avatarImg');
  (async function fetchAvatar() {
    const types = ['waifu','neko','shinobu','megumin'];
    const t = types[Math.floor(Math.random() * types.length)];
    let url = '';
    try {
      const r = await fetch(`https://api.waifu.pics/sfw/${t}`);
      if (r.ok) {
        const d = await r.json();
        url = d.url;
      }
    } catch(e) {}
    if (!url) {
      try {
        const r = await fetch('https://api.waifu.pics/sfw/waifu');
        if (r.ok) {
          const d = await r.json();
          url = d.url;
        }
      } catch(e) {}
    }
    setImageWithFallback(avatarImg, url, AVATAR_FALLBACK);
  })();

  // Загрузка нейро-неко
  const nekoImg = document.getElementById('nekoImg');
  async function fetchNeko() {
    nekoImg.style.opacity = '0.3';
    const sources = [
      async () => {
        const r = await fetch('https://nekos.life/api/v2/img/meow');
        if (r.ok) {
          const d = await r.json();
          return d.url;
        }
        throw 0;
      },
      async () => {
        const r = await fetch('https://api.waifu.pics/sfw/neko');
        if (r.ok) {
          const d = await r.json();
          return d.url;
        }
        throw 0;
      }
    ];
    let url = '';
    for (let fn of sources) {
      try {
        url = await fn();
        if (url) break;
      } catch(e) {}
    }
    setImageWithFallback(nekoImg, url, WAIFU_FALLBACK);
  }
  document.getElementById('nekoCorner').addEventListener('click', fetchNeko);
  fetchNeko();
  setInterval(fetchNeko, 30000);

  // Галерея с заглушками
  const gallery = document.getElementById('gallery');
  async function loadGalleryImage(imgElement) {
    const categories = ['waifu','neko','shinobu','megumin','awoo','cuddle','hug','pat','smile','wave'];
    const cat = categories[Math.floor(Math.random() * categories.length)];
    try {
      const resp = await fetch(`https://api.waifu.pics/sfw/${cat}`);
      if (resp.ok) {
        const data = await resp.json();
        if (data && data.url) {
          setImageWithFallback(imgElement, data.url, WAIFU_FALLBACK);
          return;
        }
      }
    } catch(e) {}
    imgElement.style.display = 'none';
  }
  (function buildGallery() {
    gallery.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      const img = document.createElement('img');
      img.alt = `аниме ${i+1}`;
      img.style.opacity = '0.4';
      gallery.appendChild(img);
      loadGalleryImage(img);
    }
  })();

  // Цитаты (работают без сети)
  const quotes = [
    { q:'Если не веришь в себя, то и не стоит начинать.', c:'Макака', a:'Доктор Стоун' },
    { q:'Настоящая сила — в умении защищать.',           c:'Аска',   a:'Евангелион' },
    { q:'Неважно, сколько у тебя таланта. Главное — желание.', c:'Мидория', a:'Моя геройская академия' },
    { q:'Даже в самой глубокой тьме можно найти свет.',  c:'Тандзиро', a:'Клинок, рассекающий демонов' },
  ];
  function fetchQuote() {
    const f = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById('quoteText').textContent = `"${f.q}"`;
    document.getElementById('quoteSrc').textContent  = `— ${f.c} · ${f.a}`;
  }
  fetchQuote();
  document.getElementById('newQuoteBtn').addEventListener('click', fetchQuote);

  // Проверка IP (без WebRTC краша)
  function checkWebRTC() {
    if (!window.RTCPeerConnection) return Promise.resolve(null);
    return new Promise((resolve) => {
      try {
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.createDataChannel('');
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        pc.onicecandidate = (e) => {
          if (e.candidate) {
            const parts = e.candidate.candidate.split(' ');
            const ip = parts[4];
            if (ip && ip !== '0.0.0.0' && !ip.startsWith('192.168') && !ip.startsWith('10.') && !ip.startsWith('172.')) {
              resolve(ip);
              pc.close();
            }
          } else {
            resolve(null);
            pc.close();
          }
        };
        setTimeout(() => { resolve(null); pc.close(); }, 3000);
      } catch (e) {
        resolve(null);
      }
    });
  }

  // Безопасный запуск IP-проверки (если вкладка активна)
  async function runIpCheck() {
    const tbody = document.getElementById('ipTableBody');
    if (!tbody) return;
    tbody.innerHTML = '<tr><td>Загрузка...</td><td>⏳</td></tr>';
    try {
      const IP_TOKEN = '0zf1rwtib5ttwi0d';
      const API_BASE = 'https://api.2ip.io';
      const check = await fetch(`${API_BASE}/check?token=${IP_TOKEN}`).then(r => r.json()).catch(() => null);
      const geo   = await fetch(`${API_BASE}/geo/ip?token=${IP_TOKEN}`).then(r => r.json()).catch(() => null);
      const dns   = await fetch(`${API_BASE}/dns?token=${IP_TOKEN}`).then(r => r.json()).catch(() => null);

      // ... логика заполнения таблицы такая же, как в предыдущей версии ...
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="2">Ошибка загрузки данных</td></tr>`;
    }
  }

  // Автозапуск IP-проверки при открытии вкладки
  document.querySelector('[data-tab="ip"]')?.addEventListener('click', runIpCheck);
  if (document.getElementById('tab-ip')?.classList.contains('active')) runIpCheck();

  // Остальной код (темы, атака, история и т.д.) остаётся без изменений, но важно:
  // - Загрузка services.json обёрнута в try/catch и не блокирует страницу
  // - Атака использует пустой массив, если файл не загрузился
})();
