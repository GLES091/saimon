<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GOD_AE86 ✦ аниме-плеер</title>
  <meta name="description" content="Персональная страница GOD_AE86. Аниме-вайб, неко API и Telegram-спамер.">
  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* variables */
    :root {
      --bg: #1a1025;
      --bg2: #22133a;
      --card: rgba(34,18,58,0.88);
      --text: #f2deff;
      --muted: #c9a8e2;
      --accent: #ffb7c5;
      --purple: #c77dff;
      --teal: #a8edea;
      --border: rgba(199,125,255,0.22);
      --shadow: 0 4px 40px rgba(255,183,197,0.16);
      --glow: 0 0 28px rgba(255,183,197,0.42);
      --pglow: 0 0 28px rgba(199,125,255,0.4);
      --radius: 22px;
      --tr: 0.28s cubic-bezier(.2,0,0,1);
      --fh: 'Mochiy Pop One', cursive;
      --fb: 'Nunito', sans-serif;
    }
    [data-theme="light"] {
      --bg: #fce8f3; --bg2: #f9d8eb; --card: rgba(255,245,252,0.93);
      --text: #3a1a2e; --muted: #7a4a68; --accent: #e05a82; --purple: #9b59b6;
      --border: rgba(224,90,130,0.22); --shadow: 0 4px 30px rgba(224,90,130,0.13);
      --glow: 0 0 24px rgba(224,90,130,0.38); --pglow: 0 0 24px rgba(155,89,182,0.35);
    }
    [data-anime="on"] {
      --accent: #ff4da6; --purple: #bf00ff; --border: rgba(191,0,255,0.32);
      --shadow: 0 4px 50px rgba(255,77,166,0.3); --glow: 0 0 40px rgba(255,77,166,0.6);
    }
    * { margin:0; padding:0; box-sizing: border-box; }
    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 60% 55% at 10% 10%, rgba(199,125,255,.12) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 45% at 90% 85%, rgba(255,183,197,.1) 0%, transparent 55%);
      pointer-events: none;
    }
    /* VFX */
    .petal, .star-vfx { position: absolute; pointer-events: none; will-change: transform, opacity; }
    .petal {
      border-radius: 50% 0 50% 0;
      background: radial-gradient(ellipse at 35% 35%, #ffcfd9 0%, #ff85a1 55%, rgba(255,100,140,0) 100%);
      animation: petalFall linear infinite;
    }
    @keyframes petalFall {
      0%   { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0.85; }
      100% { transform: translateY(115vh) rotate(360deg) translateX(0); opacity: 0; }
    }
    .star-vfx {
      border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 18px var(--purple);
      animation: starDrop linear infinite;
    }
    @keyframes starDrop {
      0%   { transform: translateY(-20px) scale(1); opacity: 0; }
      10%  { opacity: 0.9; }
      100% { transform: translateY(115vh) scale(0.3); opacity: 0; }
    }
    /* Layout */
    .fixed-top { position: fixed; top: 1rem; right: 1rem; display: flex; gap: 0.7rem; z-index: 200; }
    .icon-btn {
      width: 48px; height: 48px; border-radius: 50%; background: var(--card); border: 1.5px solid var(--border);
      cursor: pointer; font-size: 1.4rem; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(14px); transition: all var(--tr); color: var(--text);
    }
    .icon-btn:hover { transform: scale(1.05); box-shadow: var(--glow); border-color: var(--accent); }
    .page-wrap { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem 5rem; }
    .container { width: 100%; max-width: 960px; display: flex; flex-direction: column; gap: 1.6rem; }
    
    /* Tabs */
    .tabs-wrapper { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); backdrop-filter: blur(14px); padding: 0.5rem; }
    .tablist { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; }
    .tab-btn {
      flex: 1 0 auto; min-width: 90px; background: transparent; border: none; padding: 0.8rem 1.2rem;
      border-radius: calc(var(--radius) - 6px); cursor: pointer; font-weight: 800; font-family: var(--fh);
      font-size: 0.8rem; letter-spacing: 0.5px; color: var(--muted); transition: all var(--tr);
    }
    .tab-btn.active, .tab-btn:hover {
      background: linear-gradient(135deg, var(--accent), var(--purple));
      color: white; box-shadow: 0 0 18px rgba(255,183,197,0.4); transform: translateY(-2px);
    }
    .tab-panel { display: none; animation: fadeSlide 0.35s ease; }
    .tab-panel.active { display: block; }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    
    .card { background: var(--card); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow); border: 1px solid var(--border); backdrop-filter: blur(14px); }
    
    /* Form & Buttons */
    .btn { border: none; font-weight: 800; font-size: 0.8rem; padding: 0.75rem 1.4rem; border-radius: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--purple)); color: white; box-shadow: 0 4px 14px rgba(255,183,197,.4); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,183,197,.6); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: rgba(255,183,197,.08); }
    
    input[type="text"], input[type="number"], input[type="search"] { width: 100%; padding: 0.8rem 1rem; background: rgba(199,125,255,.07); border: 1.5px solid var(--border); border-radius: 14px; color: var(--text); outline: none; transition: 0.2s; }
    input:focus { border-color: var(--accent); }

    /* Bio */
    .profile { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    .avatar-wrap { position: relative; width: 155px; height: 155px; }
    .avatar { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: #000; border: 3px solid transparent; box-shadow: 0 0 0 6px rgba(199,125,255,.12), 0 0 40px rgba(255,183,197,.4); }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-ring, .avatar-ring2 { position: absolute; border-radius: 50%; border: 2px dashed var(--purple); pointer-events: none; animation: spin 16s linear infinite; }
    .avatar-ring { inset: -8px; opacity: 0.6; }
    .avatar-ring2 { inset: -18px; border: 1px dotted var(--accent); animation: spin 24s reverse infinite; opacity: 0.3; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .bio-name { font-family: var(--fh); font-size: 2rem; background: linear-gradient(135deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* Spammer */
    .log { background: rgba(12,5,24,.85); border-radius: 16px; padding: 1rem; height: 230px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; color: #d0b0e4; margin-top: 1rem; }
    
    /* Anime */
    .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .anime-card { background: rgba(199,125,255,.06); border-radius: 18px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; overflow: hidden; }
    .anime-card:hover { transform: translateY(-4px); box-shadow: var(--glow); border-color: var(--accent); }
    .anime-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    .anime-card .info { padding: 0.8rem; }
    .anime-card .title { font-weight: bold; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.2rem; color: var(--text); }
    .anime-card .meta { font-size: 0.75rem; color: var(--muted); }

    /* Gacha */
    .gacha-box { background: #0c051a; border-radius: var(--radius); border: 1px solid var(--border); padding: 2rem; text-align: center; box-shadow: inset 0 0 80px rgba(34,18,58,0.8); min-height: 350px; display: flex; flex-direction: column; align-items: center; justify-content: center;}
    .gacha-card { background: #120822; border-radius: 14px; overflow: hidden; width: 240px; position: relative; box-shadow: var(--glow); animation: fadeSlide 0.5s ease; border: 2px solid var(--accent); }
    .gacha-card img { width: 100%; height: 320px; object-fit: cover; }
    .gacha-card .rarity { position: absolute; top: 0.5rem; right: 0.5rem; background: rgba(0,0,0,0.8); padding: 0.2rem 0.8rem; border-radius: 20px; color: white; font-weight: bold; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); }
    .gacha-card .name { position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; font-weight: bold; }
    .inventory { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.5rem; margin-top: 1rem; }
    .inv-item { background: rgba(199,125,255,.06); border: 1px solid var(--border); border-radius: 12px; padding: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .inv-item img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
    .inv-item .info { font-size: 0.7rem; }
    .inv-item .info strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px; }

    /* Neko */
    .neko-wrap { position: fixed; bottom: 1.2rem; right: 1rem; z-index: 150; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .neko-corner { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; cursor: pointer; box-shadow: 0 0 18px rgba(255,183,197,.6); background: var(--card); }
    .neko-corner img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s; }
    .neko-tip { background: var(--card); border-radius: 30px; padding: 0.2rem 0.8rem; font-size: 0.65rem; backdrop-filter: blur(8px); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
<div id="vfx-bg" style="position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;"></div>
<div class="fixed-top">
  <button class="icon-btn" id="themeToggle" aria-label="Сменить тему">🌸</button>
  <button class="icon-btn" id="animeModeBtn" aria-label="Аниме-режим">✨</button>
</div>

<div class="neko-wrap">
  <div class="neko-corner" id="nekoCorner">
    <img id="nekoImg" src="" alt="random neko" style="opacity:0;">
  </div>
  <div class="neko-tip">🐱 нажми для котика!</div>
</div>

<div class="page-wrap"><div class="container">
  <!-- Tabs -->
  <div class="tabs-wrapper">
    <div class="tablist" id="tablist">
      <button class="tab-btn active" data-tab="bio">🌸 Био</button>
      <button class="tab-btn" data-tab="spammer">⚡ Спамер</button>
      <button class="tab-btn" data-tab="gallery">🎴 Галерея</button>
      <button class="tab-btn" data-tab="anime">🎌 Аниме</button>
      <button class="tab-btn" data-tab="gacha">✨ Гача</button>
    </div>
  </div>

  <!-- BIO -->
  <div class="tab-panel active" id="panel-bio">
    <div class="card">
      <div class="profile">
        <div class="avatar-wrap">
          <div class="avatar"><img id="avatarImg" src="" alt="GOD_AE86"></div>
          <div class="avatar-ring"></div>
          <div class="avatar-ring2"></div>
        </div>
        <div>
          <div class="bio-name">GOD_AE86</div>
          <div style="color:var(--muted); font-weight:bold; margin-bottom:0.8rem; text-transform: uppercase; font-size: 0.9rem;">@resivert</div>
          <div style="font-weight:bold; margin-bottom:0.8rem; color:var(--text);">аниме-вайб ✦ тексты ✦ батлы ✦ неко-спамер</div>
          <div style="display:flex; gap:0.5rem; flex-wrap:wrap;">
            <span class="btn-outline" style="padding:0.2rem 0.8rem; border-radius:20px; font-size:0.7rem; color:var(--accent); border-color:var(--accent);">🌸 аниме</span>
            <span class="btn-outline" style="padding:0.2rem 0.8rem; border-radius:20px; font-size:0.7rem; color:var(--accent); border-color:var(--accent);">🎤 батлы</span>
            <span class="btn-outline" style="padding:0.2rem 0.8rem; border-radius:20px; font-size:0.7rem; color:var(--accent); border-color:var(--accent);">🐾 неко</span>
            <span class="btn-outline" style="padding:0.2rem 0.8rem; border-radius:20px; font-size:0.7rem; color:var(--accent); border-color:var(--accent);">⚡ спамер</span>
          </div>
          <div style="background:rgba(199,125,255,.1); border-left:3px solid var(--purple); padding:1rem; border-radius:8px; margin-top:1rem;">
             <div id="quoteText" style="font-style:italic;">...</div>
             <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.5rem;">
               <div id="quoteSrc" style="font-size:0.75rem; color:var(--muted); font-weight:bold;"></div>
               <button id="newQuoteBtn" class="btn-outline" style="padding:0.3rem 0.8rem; font-size:0.7rem;">🔄 новая</button>
             </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SPAMMER -->
  <div class="tab-panel" id="panel-spammer">
    <div class="card">
      <h2 style="font-family:var(--fh); color:var(--accent); margin-bottom:1rem;">⚡ Remote Terminal Injector</h2>
      <p style="color:var(--muted); font-size:0.8rem; margin-bottom:1rem;">* Демо имитация стресс-тестирования</p>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem;">
        <div>
          <label style="display:block; font-size:0.75rem; color:var(--accent); font-weight:bold; margin-bottom:0.3rem;">📱 Номер жертвы</label>
          <input type="text" id="spamPhone" placeholder="+79001234567">
        </div>
        <div style="display:flex; gap:1rem;">
           <div style="flex:1;">
             <label style="display:block; font-size:0.75rem; color:var(--accent); font-weight:bold; margin-bottom:0.3rem;">⏱️ Задержка (с)</label>
             <input type="number" id="spamDelay" value="0.8" step="0.1">
           </div>
           <div style="flex:1;">
             <label style="display:block; font-size:0.75rem; color:var(--accent); font-weight:bold; margin-bottom:0.3rem;">🔄 Циклы</label>
             <input type="number" id="spamCycles" value="5">
           </div>
        </div>
      </div>
      
      <div style="display:flex; gap:1rem; margin-bottom:1rem;">
        <button class="btn btn-primary" id="startSpamBtn" style="flex:1;">▶ НАЧАТЬ АТАКУ</button>
        <button class="btn btn-outline" id="stopSpamBtn" style="flex:1; border-color:#ff607e; color:#ff607e;">⏹ ПРЕРВАТЬ</button>
      </div>
      
      <div class="log" id="spamLog">
        <div style="display:flex; justify-content:space-between; margin-bottom:0.5rem; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:0.5rem;">
          <strong>SYSTEM LOG</strong>
          <button id="clearSpamBtn" style="background:none;border:none;color:var(--accent);cursor:pointer;font-weight:bold;">Очистить</button>
        </div>
        <div id="spamLogLines"></div>
      </div>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="tab-panel" id="panel-gallery">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; flex-wrap:wrap; gap:1rem;">
        <h2 style="font-family:var(--fh); color:var(--accent);">🎴 Арт Галерея</h2>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap;" id="galCats">
          <button class="btn btn-primary" data-cat="waifu">waifu</button>
          <button class="btn btn-outline" data-cat="neko">neko</button>
          <button class="btn btn-outline" data-cat="kitsune">kitsune</button>
          <button class="btn btn-outline" data-cat="husbando">husbando</button>
        </div>
        <button class="btn btn-primary" id="reloadGalBtn">🔄 Обновить</button>
      </div>
      <div id="galleryGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:1rem;"></div>
    </div>
  </div>

  <!-- ANIME PLAYER -->
  <div class="tab-panel" id="panel-anime">
    <div class="card">
      <!-- CATALOG VIEW -->
      <div id="animeCatalogView">
        <h2 style="font-family:var(--fh); color:var(--accent); margin-bottom:1rem;">🎌 Аниме-плеер</h2>
        <form id="animeSearchForm" style="display:flex; gap:0.5rem; margin-bottom:1.5rem;">
          <input type="search" id="animeSearch" placeholder="Поиск (на русском или англ)..." style="flex:1;">
          <button type="submit" class="btn btn-primary">🔍 Поиск</button>
        </form>
        <div id="animeCatalogStatus" style="text-align:center; color:var(--muted); margin-bottom:1rem; font-weight:bold;"></div>
        <div id="animeResults" class="anime-grid"></div>
      </div>
      
      <!-- PLAYER VIEW -->
      <div id="animePlayerView" style="display:none;">
        <button class="btn btn-outline" id="backToCatalogAnime" style="margin-bottom:1rem;">← Вернуться в каталог</button>
        
        <!-- Anime Details Info Box -->
        <div id="animeInfoBox" style="display:flex; gap:1.5rem; margin-bottom:1.5rem; align-items:flex-start; flex-wrap:wrap; background:rgba(34,18,58,0.5); padding:1rem; border-radius:var(--radius); border:1px solid var(--border);">
          <img id="apPoster" src="" style="width:140px; height:200px; object-fit:cover; border-radius:12px; box-shadow:var(--shadow);">
          <div style="flex:1; min-width:200px;">
            <h2 id="apTitle" style="color:var(--accent); font-weight:bold; font-family:var(--fh); margin-bottom:0.3rem;"></h2>
            <div id="apEngTitle" style="color:var(--muted); font-size:0.85rem; margin-bottom:0.8rem;"></div>
            <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.8rem;" id="apGenres"></div>
            <div id="apDesc" style="font-size:0.8rem; line-height:1.5; color:var(--text); max-height:100px; overflow-y:auto; padding-right:5px;"></div>
          </div>
        </div>

        <div id="animePlayerStatus" style="color:var(--muted); margin-bottom:1rem; font-weight:bold;"></div>
        
        <h3 id="episodesTitle" style="margin-bottom:0.5rem; display:none; color:var(--accent); font-family:var(--fh);">Серии:</h3>
        <div id="animeEpisodes" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(70px, 1fr)); gap:0.5rem; margin-bottom:1rem; max-height:200px; overflow-y:auto; padding-right:5px;"></div>
        
        <div id="videoContainer" style="display:none; position:relative; background:#000; border-radius:18px; overflow:hidden; aspect-ratio:16/9; box-shadow:var(--shadow);">
          <div style="position:absolute; top:0.8rem; right:0.8rem; z-index:10; display:flex; gap:0.5rem;">
            <select id="videoQuality" class="btn-outline" style="background:rgba(0,0,0,0.7); color:white; border:1px solid var(--border); border-radius:8px; padding:0.3rem 0.6rem; font-size:0.8rem; outline:none; cursor:pointer;">
              <option value="hls_1080">1080p</option>
              <option value="hls_720" selected>720p</option>
              <option value="hls_480">480p</option>
            </select>
          </div>
          <video id="hlsVideo" controls playsinline style="width:100%; height:100%; object-fit:contain;"></video>
        </div>
      </div>
    </div>
  </div>

  <!-- GACHA -->
  <div class="tab-panel" id="panel-gacha">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid var(--border);">
        <div style="font-family:var(--fh); color:var(--accent); display:flex; align-items:center; gap:0.5rem;">
          <span style="font-size:1.5rem;">🪙</span> <span id="coinsCount" style="font-size:1.2rem;">1000</span> монет
        </div>
        <button class="btn btn-outline" id="dailyRewardBtn">+ Ежедневный бонус</button>
      </div>

      <div class="gacha-box">
        <div id="gachaResultContainer" style="display:none; margin-bottom:2rem;"></div>
        <button class="btn btn-primary" id="rollGachaBtn" style="padding:1rem 2rem; font-size:1.1rem; border-radius:30px; box-shadow:0 0 30px rgba(255,183,197,0.5);">
          ✨ ПРИЗЫВ (100)
        </button>
      </div>

      <h3 style="margin-top:2rem; margin-bottom:1rem; font-family:var(--fh); font-size:1rem; color:var(--muted);">🎒 Инвентарь:</h3>
      <div class="inventory" id="gachaInventory"></div>
    </div>
  </div>

</div></div>

<script>
// ---------- Core System ----------
const state = {
  theme: localStorage.getItem('theme') || 'dark',
  animeMode: false,
  coins: parseInt(localStorage.getItem('coins')) || 1000,
  inventory: JSON.parse(localStorage.getItem('inventory')) || []
};

// Toggle Theme
const html = document.documentElement;
html.setAttribute('data-theme', state.theme);
document.getElementById('themeToggle').textContent = state.theme === 'dark' ? '🌸' : '🌙';
document.getElementById('themeToggle').addEventListener('click', () => {

// ---------- Spammer ----------
const spamLog = document.getElementById('spamLogLines');
const spamLogScroll = document.getElementById('spamLog');
let spamInt = null;

function addLog(msg, type='info') {
  const d = document.createElement('div');
  d.style.color = type==='err' ? '#ff607e' : (type==='ok' ? '#a8edea' : '#d0b0e4');
  d.style.marginBottom = '2px';
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  spamLog.appendChild(d);
  spamLogScroll.scrollTop = spamLogScroll.scrollHeight;
}

document.getElementById('clearSpamBtn').addEventListener('click', () => spamLog.innerHTML = '');

document.getElementById('startSpamBtn').addEventListener('click', () => {
  if(spamInt) return;
  const phone = document.getElementById('spamPhone').value.trim() || "+79001234567";
  const delay = parseFloat(document.getElementById('spamDelay').value) || 0.8;
  const cycles = parseInt(document.getElementById('spamCycles').value) || 5;
  
  addLog(`Запуск сессии стресс-тестирования на: ${phone}`);
  let c = 0;
  
  spamInt = setInterval(() => {
    c++;
    if(cycles > 0 && c > cycles) {
      clearInterval(spamInt);
      spamInt = null;
      addLog('Атака успешно завершена.', 'ok');
      return;
    }
    addLog(`[Цикл ${c}] Подготовка инъекций...`);
    setTimeout(() => { if(spamInt) addLog(`[Цикл ${c}] Telegram Auth -> OK`, 'ok'); }, 200*delay);
    setTimeout(() => { if(spamInt) addLog(`[Цикл ${c}] VK Gateway -> 429 Limit`, 'err'); }, 500*delay);
  }, delay*1000 + 600);
});

document.getElementById('stopSpamBtn').addEventListener('click', () => {
  if(spamInt) {
    clearInterval(spamInt);
    spamInt = null;
    addLog('Прервано пользователем', 'err');
  }
});

// ---------- Anime Player (AniLibria) ----------
let currentHlsInstance = null;
const API_BASE = 'https://anilibria.top/api/v1';

let apCurrentEps = [];
let apCurrentEpIndex = -1;
let apCurrentQuality = 'hls_720';
let apCurrentReleaseData = null;
let apFranchisesData = [];

async function fetchTopAnime() {
  document.getElementById('animeCatalogStatus').textContent = 'Загрузка последних релизов...';
  document.getElementById('animeResults').innerHTML = '';
  try {
    const res = await fetch(API_BASE + '/anime/releases/latest');
    const data = await res.json();
    renderAnimeCards(data || []);
  } catch(e) {}
  document.getElementById('animeCatalogStatus').textContent = '';
}

document.getElementById('animeSearchForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const q = document.getElementById('animeSearch').value.trim();
  if(!q) return fetchTopAnime();
  
  document.getElementById('animeCatalogStatus').textContent = `Поиск: ${q}`;
  document.getElementById('animeResults').innerHTML = '';
  try {
    const res = await fetch(API_BASE + `/app/search/releases?query=${encodeURIComponent(q)}`);
    const data = await res.json();
    renderAnimeCards(data || []);
    if(!data || data.length===0) document.getElementById('animeCatalogStatus').textContent = 'По запросу ничего не найдено';
    else document.getElementById('animeCatalogStatus').textContent = '';
  } catch(e) {}
});

function renderAnimeCards(list) {
  const container = document.getElementById('animeResults');
  list.forEach(item => {
    const card = document.createElement('div');
    card.className = 'anime-card';
    const title = item.name?.main || item.name?.english || item.alias;
    const year = item.year || 'TBA';
    const type = item.type?.description || item.type?.value || 'OVA';
    const posterUrl = item.poster?.optimized?.src || item.poster?.src || item.poster?.optimized?.thumbnail || item.poster?.thumbnail || '';
    const imgUrl = posterUrl.startsWith('http') ? posterUrl : 'https://anilibria.top' + posterUrl;
    
    card.innerHTML = `
      <img src="${imgUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/150x225/1a1025/c77dff?text=No+Poster'">
      <div class="info">
        <div class="title" title="${title}">${title}</div>
        <div class="meta">${year} • ${type}</div>
      </div>
    `;
    card.addEventListener('click', () => openAnimePlayer(item));
    container.appendChild(card);
  });
}

async function openAnimePlayer(anime) {
  document.getElementById('animeCatalogView').style.display = 'none';
  document.getElementById('animePlayerView').style.display = 'block';
  
  const status = document.getElementById('animePlayerStatus');
  const epsDiv = document.getElementById('animeEpisodes');
  const videoCont = document.getElementById('videoContainer');
  const epsTitle = document.getElementById('episodesTitle');
  const infoBox = document.getElementById('animeInfoBox');
  
  epsDiv.innerHTML = ''; 
  epsTitle.style.display = 'none';
  videoCont.style.display = 'none';
  status.textContent = 'Загрузка информации...';
  
  // Set basic data immediately
  document.getElementById('apTitle').textContent = anime.name?.main || anime.alias;
  document.getElementById('apEngTitle').textContent = anime.name?.english || '';
  document.getElementById('apDesc').textContent = anime.description || 'Описание отсутствует.';
  
  const posterUrl = anime.poster?.optimized?.src || anime.poster?.src || '';
  const imgUrl = posterUrl.startsWith('http') ? posterUrl : 'https://anilibria.top' + posterUrl;
  document.getElementById('apPoster').src = imgUrl;
  document.getElementById('apGenres').innerHTML = ''; // reset

  if(currentHlsInstance) { currentHlsInstance.destroy(); currentHlsInstance = null; }
  document.getElementById('hlsVideo').pause();
  document.getElementById('hlsVideo').removeAttribute('src');

  try {
    // Fetch full data
    const res = await fetch(API_BASE + `/anime/releases/${anime.id}`);
    const data = await res.json();
    apCurrentReleaseData = data;
    
    // Also fetch franchise data in background for season loop
    apFranchisesData = [];
    fetch(API_BASE + `/anime/franchises/release/${anime.id}`).then(r=>r.json()).then(d=>{
      if(d && d.length > 0 && d[0].franchise_releases) {
        apFranchisesData = d[0].franchise_releases.sort((a,b)=>a.sort_order - b.sort_order);
      }
    }).catch(e=>{});
    
    status.textContent = '';
    
    // Add genres
    const genresWrap = document.getElementById('apGenres');
    genresWrap.innerHTML = '';
    if(data.genres) {
      data.genres.forEach(g => {
        const p = document.createElement('span');
        p.className = 'btn-outline';
        p.style.padding = '0.2rem 0.6rem';
        p.style.borderRadius = '20px';
        p.style.fontSize = '0.7rem';
        p.textContent = g.name;
        genresWrap.appendChild(p);
      });
    }

    apCurrentEps = data.episodes || [];
    apCurrentEps.sort((a,b) => Number(a.ordinal) - Number(b.ordinal));
    
    if(apCurrentEps.length === 0) {
      status.textContent = 'Список серий пуст.';
      return;
    }
    
    epsTitle.style.display = 'block';
    
    apCurrentEps.forEach((ep, idx) => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-outline ep-btn';
      btn.dataset.idx = idx;
      btn.style.padding = '0.4rem';
      btn.style.fontSize = '0.8rem';
      btn.style.textAlign = 'center';
      btn.textContent = `${ep.ordinal} эп`;
      btn.addEventListener('click', () => {
        playEpisodeIndex(idx);
      });
      epsDiv.appendChild(btn);
    });
  } catch(e) {
    status.textContent = 'Ошибка загрузки плеера.';
  }
}

document.getElementById('videoQuality').addEventListener('change', (e) => {
  apCurrentQuality = e.target.value;
  if(apCurrentEpIndex >= 0) {
    const video = document.getElementById('hlsVideo');
    const ct = video.currentTime;
    const wasPlaying = !video.paused;
    playEpisodeIndex(apCurrentEpIndex, ct, wasPlaying);
  }
});

function playEpisodeIndex(idx, startTime=0, autoPlay=true) {
  if(idx < 0 || idx >= apCurrentEps.length) return;
  apCurrentEpIndex = idx;
  const ep = apCurrentEps[idx];
  
  // Highlight buttons
  document.querySelectorAll('.ep-btn').forEach(b => {
    if(b.dataset.idx == idx) {
      b.style.background = 'rgba(255,183,197,.1)';
      b.style.borderColor = 'var(--accent)'; 
      b.style.color = 'var(--accent)';
    } else {
      b.style.background = '';
      b.style.borderColor = 'var(--border)';
      b.style.color = 'var(--muted)';
    }
  });

  let url = ep[apCurrentQuality] || ep['hls_720'] || ep['hls_480'] || ep['hls_1080'];
  if(!url) return;
  if(!url.startsWith('http')) url = 'https://cache.libria.fun' + url;
  
  playVideo(url, startTime, autoPlay);
}

document.getElementById('backToCatalogAnime').addEventListener('click', () => {
  document.getElementById('animeCatalogView').style.display = 'block';
  document.getElementById('animePlayerView').style.display = 'none';
  if(currentHlsInstance) { currentHlsInstance.destroy(); }
  document.getElementById('hlsVideo').pause();
});

document.getElementById('hlsVideo').addEventListener('ended', async () => {
  if (apCurrentEpIndex >= 0 && apCurrentEpIndex < apCurrentEps.length - 1) {
    // Next episode
    playEpisodeIndex(apCurrentEpIndex + 1);
  } else if (apCurrentEpIndex === apCurrentEps.length - 1 && apFranchisesData.length > 0 && apCurrentReleaseData) {
    // End of release, look for next season
    const currFrIdx = apFranchisesData.findIndex(f => f.release_id === apCurrentReleaseData.id);
    if(currFrIdx >= 0 && currFrIdx < apFranchisesData.length - 1) {
      const nextRel = apFranchisesData[currFrIdx + 1];
      if(nextRel && nextRel.release) {
        document.getElementById('animePlayerStatus').textContent = 'Переход к следующему сезону...';
        await openAnimePlayer(nextRel.release);
        // Autoplay series 1
        setTimeout(() => {
          if(apCurrentEps.length > 0) playEpisodeIndex(0);
        }, 800);
      }
    }
  }
});

function playVideo(url, startTime=0, autoPlay=true) {
  const cont = document.getElementById('videoContainer');
  const video = document.getElementById('hlsVideo');
  cont.style.display = 'block';
  video.pause();
  
  if(currentHlsInstance) { currentHlsInstance.destroy(); }
  
  if(Hls.isSupported()) {
    currentHlsInstance = new Hls();
    currentHlsInstance.loadSource(url);
    currentHlsInstance.attachMedia(video);
    currentHlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
      if(startTime > 0) video.currentTime = startTime;
      if(autoPlay) video.play().catch(()=>{});
    });
  } else if(video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    if(startTime > 0) {
      video.addEventListener('loadedmetadata', function onLoaded() {
        video.currentTime = startTime;
        video.removeEventListener('loadedmetadata', onLoaded);
      });
    }
    if(autoPlay) video.play().catch(()=>{});
  }
  cont.scrollIntoView({behavior: 'smooth', block: 'start'});
}


// ---------- Gacha ----------
function updateCoins() {
  document.getElementById('coinsCount').textContent = state.coins;
  localStorage.setItem('coins', state.coins);
}

document.getElementById('dailyRewardBtn').addEventListener('click', () => {
  state.coins += 500;
  updateCoins();
  document.getElementById('dailyRewardBtn').disabled = true;
  document.getElementById('dailyRewardBtn').textContent = '✅ Получено';
  setTimeout(() => {
    document.getElementById('dailyRewardBtn').disabled = false;
    document.getElementById('dailyRewardBtn').textContent = '+ Ежедневный бонус';
  }, 60000); // 1 minute cooldown for demo
});

document.getElementById('rollGachaBtn').addEventListener('click', async () => {
  if(state.coins < 100) return;
  const btn = document.getElementById('rollGachaBtn');
  const resCont = document.getElementById('gachaResultContainer');
  
  btn.disabled = true;
  btn.textContent = '...Призыв...';
  state.coins -= 100;
  updateCoins();
  
  try {
    const res = await fetch('https://api.jikan.moe/v4/random/characters');
    const data = await res.json();
    const char = data.data;
    
    let rarity = 'R 💫'; let rClass = 'color:var(--teal);';
    if(char.favorites > 15000) { rarity = 'SSR 🌟'; rClass = 'color:#facc15;'; }
    else if(char.favorites > 6000) { rarity = 'SR ✨'; rClass = 'color:var(--purple);'; }
    
    const obj = { name: char.name, img: char.images.jpg.image_url, rarity, rClass };
    state.inventory.unshift(obj);
    localStorage.setItem('inventory', JSON.stringify(state.inventory));
    
    resCont.style.display = 'block';
    resCont.innerHTML = `
      <div class="gacha-card">
        <div class="rarity">${rarity}</div>
        <img src="${obj.img}">
        <div class="name">${obj.name}</div>
      </div>
    `;
    renderInventory();
  } catch(e) {
    state.coins += 100; updateCoins();
  }
  
  btn.disabled = false;
  btn.textContent = '✨ ПРИЗЫВ (100)';
});

function renderInventory() {
  const inv = document.getElementById('gachaInventory');
  inv.innerHTML = '';
  state.inventory.forEach(item => {
    const d = document.createElement('div');
    d.className = 'inv-item';
    d.innerHTML = `
      <img src="${item.img}" loading="lazy">
      <div class="info">
        <strong>${item.name}</strong>
        <span style="${item.rClass} font-weight:bold;">${item.rarity}</span>
      </div>
    `;
    inv.appendChild(d);
  });
}
// Init Gacha on load
updateCoins();
</script>
