<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOD_AE86 ✦ аниме-плеер</title>
  <meta name="description" content="HiAnime плеер + Jikan поиск">
  <script src="https://cdn.jsdelivr.net/npm/libphonenumber-js@1.11.12/bundle/libphonenumber-min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.css">
  <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* Весь ваш старый CSS (те же переменные, карточки, анимации) полностью сохранён */
    :root {
      --bg:       #1a1025;
      --bg2:      #22133a;
      --card:     rgba(34,18,58,0.88);
      --text:     #f2deff;
      --muted:    #c9a8e2;
      --accent:   #ffb7c5;
      --purple:   #c77dff;
      --border:   rgba(199,125,255,0.22);
      --shadow:   0 4px 40px rgba(255,183,197,0.16);
      --glow:     0 0 28px rgba(255,183,197,0.42);
      --pglow:    0 0 28px rgba(199,125,255,0.4);
      --radius:   22px;
      --tr:       0.32s cubic-bezier(.4,0,.2,1);
      --fh:       'Mochiy Pop One', cursive;
      --fb:       'Nunito', sans-serif;
    }
    [data-theme="light"] {
      --bg:     #fce8f3;
      --bg2:    #f9d8eb;
      --card:   rgba(255,245,252,0.93);
      --text:   #3a1a2e;
      --muted:  #7a4a68;
      --accent: #e05a82;
      --purple: #9b59b6;
      --border: rgba(224,90,130,0.22);
      --shadow: 0 4px 30px rgba(224,90,130,0.13);
      --glow:   0 0 24px rgba(224,90,130,0.38);
      --pglow:  0 0 24px rgba(155,89,182,0.35);
    }
    [data-anime="on"] {
      --accent:  #ff4da6;
      --purple:  #bf00ff;
      --border:  rgba(191,0,255,0.32);
      --shadow:  0 4px 50px rgba(255,77,166,0.3);
      --glow:    0 0 40px rgba(255,77,166,0.6);
      --pglow:   0 0 40px rgba(191,0,255,0.55);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--fb);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .5s, color .5s;
    }
    /* ... остальной CSS (все классы, vfx-фон, петалс, карточки, плеер, галерея) оставлен без изменений, чтобы ответ был читаемым.
       Для экономии места я не дублирую весь CSS, он идентичен вашему исходному.
       Вы можете скопировать его из предыдущего полного index.html. */
  </style>
</head>
<body>

<div id="vfx-bg"></div>

<div class="fixed-top">
  <button class="icon-btn" id="themeToggle"  title="Сменить тему">🌸</button>
  <button class="icon-btn" id="animeModeBtn" title="Аниме-режим">✨</button>
</div>

<div class="neko-wrap">
  <div class="neko-corner" id="nekoCorner">
    <img id="nekoImg" src="" alt="neko" style="opacity:0; transition: opacity .5s;">
  </div>
  <div class="neko-tip">🐱 нажми для котика!</div>
</div>

<div class="page-wrap">
  <div class="container">

    <nav class="tabs">
      <div class="tab active" data-tab="bio">🌸 Био</div>
      <div class="tab"        data-tab="spammer">✨ Спамер</div>
      <div class="tab"        data-tab="music">🎀 Музыка</div>
      <div class="tab"        data-tab="gallery">🎴 Галерея</div>
      <div class="tab"        data-tab="anime">🎌 Аниме</div>
    </nav>

    <!-- Вкладки Био, Спамер, Музыка, Галерея остаются без изменений -->
    <!-- ... -->

    <!-- 🎌 Аниме-каталог + плеер -->
    <div class="tab-content" id="tab-anime">
      <div class="card">
        <div id="catalogView">
          <div class="gallery-title">🎌 Аниме-каталог</div>
          <p class="gallery-sub">Jikan + HiAnime API. Нажми на карточку для серий.</p>
          <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
            <input type="text" id="animeSearch" placeholder="Название аниме..."
                   style="flex:1; padding:0.7rem; border-radius:14px; border:1.5px solid var(--border);
                          background: rgba(199,125,255,.07); color:var(--text); font-family:var(--fb);">
            <button class="btn btn-primary" id="animeSearchBtn">🔍 Искать</button>
          </div>
          <div id="animeResults" class="anime-grid"></div>
        </div>

        <div id="playerView" class="player-view">
          <button class="btn btn-outline back-btn" id="backToCatalog">← Назад к каталогу</button>
          <div class="gallery-title" id="selectedAnimeTitle"></div>
          <div id="episodeList"></div>
          <div id="playerContainer" style="display:none;">
            <div id="artplayer"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  /* ════════ ВСЯ ПРЕДЫДУЩАЯ ЛОГИКА (темы, вкладки, галерея, неко) ════════ */
  // ... ( полный скрипт из исходного index.html, вплоть до секции аниме )

  /* ═══════════════════════════════════════
     🎌 АНИМЕ-КАТАЛОГ + ПЛЕЕР (Jikan + HiAnime)
  ═══════════════════════════════════════ */
  const animeSearch = document.getElementById('animeSearch'),
        animeSearchBtn = document.getElementById('animeSearchBtn'),
        animeResults = document.getElementById('animeResults'),
        catalogView = document.getElementById('catalogView'),
        playerView = document.getElementById('playerView'),
        backBtn = document.getElementById('backToCatalog'),
        selectedTitle = document.getElementById('selectedAnimeTitle'),
        episodeList = document.getElementById('episodeList'),
        playerContainer = document.getElementById('playerContainer');
  let artPlayerInstance = null;

  async function fetchFromApi(action, param) {
    const res = await fetch(`/api/anime?action=${action}&query=${encodeURIComponent(param)}`);
    return await res.json();
  }

  function showCatalog() {
    catalogView.style.display = 'block';
    playerView.style.display = 'none';
    if(artPlayerInstance){ artPlayerInstance.destroy(); artPlayerInstance=null; }
    playerContainer.style.display = 'none';
  }
  function showPlayerView(title) {
    catalogView.style.display = 'none';
    playerView.style.display = 'block';
    selectedTitle.textContent = title || '';
    episodeList.innerHTML = '';
    playerContainer.style.display = 'none';
  }
  backBtn.addEventListener('click', showCatalog);

  async function searchAnimeCatalog(query) {
    animeResults.innerHTML = '<p style="color:var(--muted); grid-column:1/-1;">🔍 Ищем...</p>';
    try {
      const data = await fetchFromApi('search', query);
      if(data.results?.length) {
        renderAnimeCards(data.results);
      } else {
        animeResults.innerHTML = '<p style="color:var(--muted); grid-column:1/-1;">Ничего не найдено</p>';
      }
    } catch(e) {
      animeResults.innerHTML = '<p style="color:#ff8fa3; grid-column:1/-1;">Ошибка поиска</p>';
    }
  }

  function renderAnimeCards(list){
    animeResults.innerHTML = '';
    list.forEach(anime => {
      const card = document.createElement('div');
      card.className = 'anime-card';
      card.innerHTML = `
        <img src="${anime.image}" alt="${anime.title}" loading="lazy"
             onerror="this.src='data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2 3"><rect fill="#22133a" width="2" height="3"/></svg>')}'">
        <div class="info">
          <div class="title" title="${anime.title}">${anime.title}</div>
          <div class="meta">${anime.year||'?'} · ${anime.type||''}</div>
        </div>
      `;
      card.addEventListener('click', ()=>{
        showPlayerView(anime.title);
        loadEpisodes(anime.id);
      });
      animeResults.appendChild(card);
    });
  }

  async function loadEpisodes(malId){
    episodeList.innerHTML = 'Загружаем серии...';
    try {
      const data = await fetchFromApi('info', malId);
      if(data.episodes?.length){
        episodeList.innerHTML = '';
        data.episodes.forEach(ep => {
          const btn = document.createElement('button');
          btn.className = 'btn btn-outline';
          btn.textContent = `Серия ${ep.number}`;
          btn.addEventListener('click', ()=> watchEpisode(ep.id));
          episodeList.appendChild(btn);
        });
      } else episodeList.innerHTML = 'Серии не найдены';
    } catch(e) { episodeList.innerHTML = 'Ошибка загрузки серий'; }
  }

  async function watchEpisode(episodeId){
    playerContainer.style.display='block';
    if(!artPlayerInstance){
      artPlayerInstance = new Artplayer({
        container: '#artplayer',
        url: '',
        autoSize: true,
        theme: '#ffb7c5',
        settings: true,
      });
    }
    try {
      const data = await fetchFromApi('watch', episodeId);
      if(data.sources?.length){
        const url = data.sources[0].file;
        if(url){
          artPlayerInstance.switchUrl(url);
          artPlayerInstance.play();
        } else alert('Ссылка не получена');
      } else alert('Видео недоступно');
    } catch(e) { alert('Ошибка воспроизведения'); }
  }

  animeSearchBtn.addEventListener('click', ()=>{
    const q = animeSearch.value.trim();
    if(q) searchAnimeCatalog(q);
  });
  animeSearch.addEventListener('keypress', e => { if(e.key==='Enter') animeSearchBtn.click(); });
</script>

<script src="spammer.js"></script>
</body>
</html>
